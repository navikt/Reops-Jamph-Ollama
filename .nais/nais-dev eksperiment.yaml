apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: jamph-ollama
  namespace: team-researchops
  labels:
    team: team-researchops
spec:
  image: {{image}}
  port: 11434
  accessPolicy:
    inbound:
      rules:
        - application: reops-felgen
          namespace: team-researchops
        - application: jamph-umami-frontend-dev
          namespace: team-researchops
        - application: jamph-rag-api-umami-dev
          namespace: team-researchops
        - application: jamph-ml-trainer
          namespace: team-researchops
        - application: jamph-mlflow
          namespace: team-researchops
        
  liveness:
    path: /api/version
    initialDelay: 120
    failureThreshold: 10
    port: 11434
  readiness:
    path: /api/tags
    initialDelay: 120
    failureThreshold: 10
    port: 11434
  #env section is an experiment.
  env:
    - name: OLLAMA_NUM_PARALLEL
      value: "1"
    - name: OMP_NUM_THREADS
      value: "8"
    - name: OPENBLAS_NUM_THREADS
      value: "8"
    - name: MKL_NUM_THREADS
      value: "8"
  resources:
    limits:
      memory: 24Gi
      #memory: 12Gi
      cpu: 8000m
      #no cpu limit
    requests:
      cpu: 8000m
      memory: 20Gi
      #memory: 9Gi
  replicas:
    min: 1
    max: 1
#   max: 3
#    cpuThresholdPercentage: 80
  ingresses:
    - "https://jamph-ollama.intern.dev.nav.no"
    - "https://jamph-ollama.ekstern.dev.nav.no"