apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: jamph-ollama
  namespace: team-researchops
  labels:
    team: team-researchops
spec:
  image: {{image}}
  port: 11434
  accessPolicy:
    inbound:
      rules:
        - application: reops-felgen
          namespace: team-researchops
        - application: Jamph-Umami-Frontend
          namespace: team-researchops
        - application: Jamph-Rag-Api-Umami
          namespace: team-researchops
        - application: Jamph-Ml-Trainer
          namespace: team-researchops
        - application: Jamph-Mlflow
          namespace: team-researchops
        
  liveness:
    path: /api/version
    initialDelay: 60
    port: 11434
  readiness:
    path: /api/tags
    initialDelay: 60
    port: 11434
  resources:
    limits:
      memory: 7Gi
    requests:
      cpu: 500m
      memory: 5Gi
  replicas:
    min: 1
    max: 3
    cpuThresholdPercentage: 80
  ingresses:
    - "https://jamph-ollama.ansatt.dev.nav.no"
    - "https://jamph-ollama.intern.dev.nav.no"
