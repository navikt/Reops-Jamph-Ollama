apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: jamph-ollama
  namespace: team-researchops
  labels:
    team: team-researchops
spec:
  image: {{image}}
  port: 11434
  accessPolicy:
    inbound:
      rules:
        - application: reops-felgen
          namespace: team-researchops
        - application: jamph-umami-frontend
          namespace: team-researchops
        - application: jamph-rag-api-umami
          namespace: team-researchops
        - application: jamph-ml-trainer
          namespace: team-researchops
        - application: jamph-mlflow
          namespace: team-researchops
  liveness:
    path: /api/version
    initialDelay: 120
    failureThreshold: 10
    port: 11434
  readiness:
    path: /api/tags
    initialDelay: 120
    failureThreshold: 10
    port: 11434
  resources:
    limits:
      memory: 12Gi
    requests:
      cpu: 500m
      memory: 9Gi
  replicas:
    min: 1
    max: 1
#   max: 3
#   cpuThresholdPercentage: 80

  ingresses:
    - "https://jamph-ollama.ansatt.nav.no"
    - "https://jamph-ollama.intern.nav.no"
